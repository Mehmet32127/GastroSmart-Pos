name: Deploy Pages

# docs/ klasörünü (önceden derlenmiş build) GitHub Actions ile Pages'e yayınlar.
# Legacy Jekyll builder yerine bu kullanılıyor (o bu içerikte timeout/error veriyordu).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact (docs/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
