<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      user-select: none;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 20px;
      object-fit: cover;
    }
    .logo-fallback {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    p  { font-size: 13px; color: #6b7280; margin-bottom: 32px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #1f2937;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #4b5563;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <img class="logo" src="assets/icon.png" alt="logo"
    onerror="this.style.display='none'; document.getElementById('logo-fb').style.display='flex'" />
  <div class="logo-fallback" id="logo-fb" style="display:none">G</div>
  <h1>GastroSmart POS</h1>
  <p>Profesyonel Restoran Adisyon Sistemi</p>
  <div class="spinner"></div>
  <div class="status" id="status">Başlatılıyor...</div>
  <script>
    const messages = [
      'Başlatılıyor...',
      'Veritabanı hazırlanıyor...',
      'Sunucu başlatılıyor...',
      'Neredeyse hazır...'
    ]
    let i = 0
    setInterval(() => {
      i = (i + 1) % messages.length
      document.getElementById('status').textContent = messages[i]
    }, 2000)
  </script>
</body>
</html>
